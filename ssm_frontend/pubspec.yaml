name: ssm_app
description: Student Success Matrix - Campus Assistant

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  http: ^1.2.1
  http_parser: ^4.0.2

  # State Management
  provider: ^6.1.2

  # Local Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # Navigation
  go_router: ^13.2.0

  # UI & Design
  cupertino_icons: ^1.0.6
  fl_chart: ^0.67.0           # score charts
  flutter_animate: ^4.5.0    # smooth animations
  google_fonts: ^6.2.1
  shimmer: ^3.0.0             # loading skeletons

  # File picker & upload
  file_picker: ^8.0.3
  image_picker: ^1.1.2

  # Utilities
  intl: ^0.19.0
  equatable: ^2.0.5
  connectivity_plus: ^6.0.3   # Network status / Offline check
  share_plus: ^10.0.0         # Sharing / CSV export
  path_provider: ^2.1.4       # File system access
  url_launcher: ^6.3.0        # Open external browser/URLs
  webview_flutter: ^4.4.0     # Added for in-app web views

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: "^0.13.1"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/